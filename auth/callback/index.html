<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Quilty - Redirecting...</title>
    <style>
        :root {
            --primary: #14B8A6;
            --background: #0F172A;
            --surface: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --gradient-start: #14B8A6;
            --gradient-end: #06B6D4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            font-size: 16px;
            font-weight: 600;
            padding: 16px 48px;
            border-radius: 12px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(20, 184, 166, 0.3);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--surface);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fallback {
            margin-top: 24px;
            padding: 16px;
            background: var(--surface);
            border-radius: 12px;
            display: none;
        }

        .fallback.show {
            display: block;
        }

        .fallback p {
            font-size: 14px;
            margin-bottom: 12px;
        }

        .fallback a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --background: #F8FAFC;
                --surface: #E2E8F0;
                --text-primary: #0F172A;
                --text-secondary: #475569;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Q</div>
        <div class="spinner" id="spinner"></div>
        <h1 id="title">Opening Quilty...</h1>
        <p id="message">Please wait while we redirect you to the app.</p>

        <button class="button" onclick="openApp()" id="continue-btn" style="display: none;">
            Continue to Quilty
        </button>

        <div class="fallback" id="fallback">
            <p>If the app didn't open, make sure you have Quilty installed.</p>
            <p>
                <a href="https://apps.apple.com/app/quilty" target="_blank">Download for iOS</a>
                <span style="color: var(--text-secondary); margin: 0 8px;">|</span>
                <a href="https://play.google.com/store/apps/details?id=app.quilty.myquilty" target="_blank">Download for Android</a>
            </p>
        </div>
    </div>

    <script>
        // Preserve the fragment (tokens are in the fragment)
        const fragment = window.location.hash;

        // Parse fragment to determine callback type
        function parseFragment() {
            if (!fragment) return { type: 'unknown' };

            const params = {};
            fragment.substring(1).split('&').forEach(function(pair) {
                const [key, value] = pair.split('=');
                params[key] = decodeURIComponent(value || '');
            });

            return params;
        }

        function openApp() {
            const params = parseFragment();

            // Construct app URL based on callback type
            let path = '/auth/callback';
            if (params.type === 'recovery') {
                path = '/auth/reset-password';
            } else if (params.type === 'signup') {
                path = '/auth/verify-email';
            }

            const appUrl = 'quilty:/' + path + fragment;

            // Try to open the app
            let opened = false;

            // Create hidden iframe to try opening app
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = appUrl;
            document.body.appendChild(iframe);

            // Check if app opened after timeout
            setTimeout(function() {
                if (!opened) {
                    // Show manual button and fallback
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('title').textContent = 'Tap to Continue';
                    document.getElementById('message').textContent = 'If the app didn\'t open automatically, tap the button below.';
                    document.getElementById('continue-btn').style.display = 'inline-block';
                    document.getElementById('fallback').classList.add('show');
                }
            }, 2500);

            // Listen for page visibility change (app opened)
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    opened = true;
                }
            });

            // Also try direct navigation
            window.location.href = appUrl;
        }

        // Auto-open on mobile, show button on desktop
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            // Auto-open app on mobile
            openApp();
        } else {
            // Show download options for desktop
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Download Quilty';
            document.getElementById('message').textContent = 'Quilty is a mobile app. Download it on your phone to continue.';
            document.getElementById('fallback').classList.add('show');
        }
    </script>
</body>
</html>
